name: lab03 library build

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get repo files
        uses: actions/checkout@v6
      - name: Build dir configuratiob
        run: cmake -H. -B build
      - name: Build
        run: cmake --build build
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Applications
          path: |
            ./build/hello_world/hello_world
            ./build/solver/solver
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: Applications
          path: ./apps
      - name: Fix permissions
        run: |
          chmod +x ./apps/hello_world/hello_world
          chmod +x ./apps/solver/solver
      - name: Hello_world test
        run: ./apps/hello_world/hello_world
      - name: Solver test
        run: echo "1 5 -6" | ./apps/solver/solver

  create-msi:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Get repo files
        uses: actions/checkout@v6
      - name: .NET setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: WiX Toolset installation
        run: |
          dotnet tool install --global wix --version 4.0.0
          wix extension add --global WixToolset.UI.wixext/4.0.4
      - name: Build
        run: |
          mkdir build
          cmake -B build
          cmake --build build --config Release --verbose
        shell: pwsh
      - name: Create MSI package
        run: |
          cd build
          cpack -G WIX -C Release --verbose
      - name: Upload .msi
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-dmg:
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Get repo files
        uses: actions/checkout@v6
      - name: Build
        run: |
          cmake -H. -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Create .dmg
        run: |
          cd build
          cpack -G DragNDrop -C Release
      - name: Upload .dmg
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-rpm-deb:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Get repo files
        uses: actions/checkout@v6
      - name: Rpm install
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Create packages
        run: |
          cmake -H. -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cd build
          cpack -G DEB -C Release
          cpack -G RPM -C Release
      - name: Upload binary packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.deb
            build/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
